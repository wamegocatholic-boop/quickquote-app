<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="goldWave" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B38A1D" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#FCEE81" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <!-- Abstract Q / Wave overlap -->
  <circle cx="256" cy="236" r="110" fill="none" stroke="url(#goldWave)" stroke-width="40" />
  <path d="M 290 290 Q 350 350 400 350" fill="none" stroke="url(#goldWave)" stroke-width="44" stroke-linecap="round" />
  <!-- Subtle accent waves -->
  <path d="M 120 250 Q 256 120 392 250" fill="none" stroke="#D4AF37" stroke-width="20" stroke-linecap="round" opacity="0.5" />
  <path d="M 120 300 Q 256 170 392 300" fill="none" stroke="#D4AF37" stroke-width="12" stroke-linecap="round" opacity="0.3" />
</svg>