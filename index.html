<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickQuote Pro - FUMA</title>
  
  <!-- Load React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel compiler for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ICONS ---
    const Icon = ({ children, className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Shield = (p) => <Icon {...p}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Icon>;
    const CheckCircle = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
    const MapPin = (p) => <Icon {...p}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></Icon>;
    const Home = (p) => <Icon {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;
    const ExternalLink = (p) => <Icon {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></Icon>;
    const User = (p) => <Icon {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
    const Users = (p) => <Icon {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Icon>;
    const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
    const Car = (p) => <Icon {...p}><path d="M14 16H9m10 0h3v-3.15a1 1 0 0 0-.84-.99L16 11l-2.7-3.6a2 2 0 0 0-1.6-.8H9.3a2 2 0 0 0-1.6.8L5 11l-5.16.86a1 1 0 0 0-.84.99V16h3m14 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM7 16a2 2 0 1 1-4 0 2 2 0 0 1 4 0z"/></Icon>;
    const Search = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Icon>;
    const Copy = (p) => <Icon {...p}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></Icon>;
    const Mail = (p) => <Icon {...p}><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></Icon>;

    // !!! CONFIGURE YOUR EMAILS HERE !!!
    const AUTOMATION_EMAIL = "zteske@fumainsurance.com"; 
    const CSR_EMAIL = "office.ks@fumainsurance.com";

    const App = () => {
      const [insured, setInsured] = useState({
        first1: '', last1: '', ssn1: '', dob1: '', dl1: '', phone1: '', email1: '', address: '',
        first2: '', last2: '', ssn2: '', dob2: '', dl2: '', phone2: '', email2: ''
      });
      const [drivers, setDrivers] = useState([]);
      const [vehicles, setVehicles] = useState([{ vin: '', year: '', make: '', model: '', coverage: 'Liability' }]);
      const [priorIns, setPriorIns] = useState({ company: '', premium: '' });
      const [home, setHome] = useState({
        address: '', sqft: '', replacementCost: '', basement: 'No', finishedBasement: 'No',
        woodStove: 'No', detached: 'No', detachedDesc: '', age: '', siding: '',
        updateElec: '', updatePlumb: '', updateHvac: '', updateRoof: '', roofMaterial: '', roofMaterialOther: '', notes: ''
      });
      const [crossSell, setCrossSell] = useState({ termLife: '', powersports: '' });
      const [overallNotes, setOverallNotes] = useState('');
      const [showSummary, setShowSummary] = useState(false);
      const [alertMsg, setAlertMsg] = useState(''); // Custom Message Box State

      const [addressSuggestions, setAddressSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [detectedCounty, setDetectedCounty] = useState(''); 
      const [addressQuery, setAddressQuery] = useState(''); 
      const suggestionRef = useRef(null);

      // --- Mobile Keyboard & Navigation Optimization ---
      useEffect(() => {
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => input.setAttribute('enterkeyhint', 'next'));
      });

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (suggestionRef.current && !suggestionRef.current.contains(event.target)) setShowSuggestions(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        const controller = new AbortController();
        const timeoutId = setTimeout(async () => {
          if (addressQuery.length > 5) {
            try {
              const kansasViewBox = "-102.05,40.00,-94.58,36.99";
              const url = `https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&addressdetails=1&viewbox=${kansasViewBox}&bounded=1&email=ks.insurance.app.test@gmail.com&q=${encodeURIComponent(addressQuery)}`;
              const response = await fetch(url, { signal: controller.signal });
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              const data = await response.json();
              setAddressSuggestions(data);
              setShowSuggestions(true);
            } catch (error) {
              if (error.name !== 'AbortError') console.error("Error fetching address:", error);
            }
          } else {
            setShowSuggestions(false);
          }
        }, 800);
        return () => { clearTimeout(timeoutId); controller.abort(); };
      }, [addressQuery]);

      const handleAddressChange = (e) => {
        const query = e.target.value;
        setInsured({ ...insured, address: query });
        setAddressQuery(query);
      };

      const handleSelectAddress = (item) => {
        setInsured({ ...insured, address: item.display_name });
        setShowSuggestions(false);
        setHome({ ...home, address: item.display_name });
        if (item.address && item.address.county) {
          setDetectedCounty(item.address.county.replace(' County', '').trim());
        } else {
          setDetectedCounty('');
        }
      };

      const handleRealtorLookup = () => {
        if (!insured.address) return setAlertMsg("Please enter an address first.");
        window.open(`https://www.realtor.com/realestateandhomes-search/${encodeURIComponent(insured.address)}`, '_blank');
      };

      const handleCountyLookup = () => {
        if (!insured.address) return setAlertMsg("Please enter an address first.");
        let countyUrl = "";
        if (detectedCounty === "Riley") countyUrl = `http://www.riley.kansasgov.com/parcel/`; 
        else if (detectedCounty === "Pottawatomie") countyUrl = `https://pottawatomie.kansasgov.com/parcel/`;
        else if (detectedCounty === "Marshall") countyUrl = `http://www.marshall.kansasgov.com/parcel/`;
        else if (detectedCounty === "Nemaha") countyUrl = `http://ks-nemaha.manatron.com/`;
        else if (detectedCounty === "Wabaunsee") countyUrl = `https://ks1052.cichosting.com/webportal/Login.aspx`;
        else if (detectedCounty === "Jackson") countyUrl = `https://jackson.kansasgov.com/parcel/`;
        else {
          const searchTerms = detectedCounty ? `${detectedCounty} county KS property search` : "county property search";
          countyUrl = `https://www.google.com/search?q=${encodeURIComponent(insured.address + " " + searchTerms)}`;
        }
        window.open(countyUrl, '_blank');
      };

      const formatDOB = (value) => {
        const v = value.replace(/\D/g, '').slice(0, 8);
        if (v.length >= 5) return `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
        else if (v.length >= 3) return `${v.slice(0, 2)}/${v.slice(2)}`;
        return v;
      };

      const addDriver = () => setDrivers([...drivers, { first: '', last: '', dob: '', dl: '', phone: '' }]);
      const removeDriver = (index) => setDrivers(drivers.filter((_, i) => i !== index));
      const updateDriver = (index, field, value) => {
        const newDrivers = [...drivers];
        newDrivers[index][field] = value;
        setDrivers(newDrivers);
      };

      const addVehicle = () => setVehicles([...vehicles, { vin: '', year: '', make: '', model: '', coverage: 'Liability' }]);
      const removeVehicle = (index) => setVehicles(vehicles.filter((_, i) => i !== index));
      const updateVehicle = (index, field, value) => {
        const newVehicles = [...vehicles];
        newVehicles[index][field] = value;
        setVehicles(newVehicles);
      };

      const decodeVin = async (index, vin) => {
        if (vin.length !== 17) return setAlertMsg("Please enter a valid 17-character VIN.");
        try {
          const response = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/${vin}?format=json`);
          const data = await response.json();
          if (data.Results && data.Results.length > 0) {
            const result = data.Results[0];
            const newVehicles = [...vehicles];
            newVehicles[index].year = result.ModelYear || '';
            newVehicles[index].make = result.Make || '';
            newVehicles[index].model = result.Model || '';
            setVehicles(newVehicles);
          }
        } catch (error) {
          console.error("Error decoding VIN:", error);
          setAlertMsg("Could not decode VIN. Please enter manually.");
        }
      };

      const handleMvrLookup = (dlNumber) => {
        if (!dlNumber) return setAlertMsg("Please enter a Driver's License number first.");
        
        // Execute copy to clipboard safely
        if (navigator && navigator.clipboard) {
            navigator.clipboard.writeText(dlNumber).catch(e => console.error("Clipboard copy failed", e));
        } else {
            // Fallback for iFrame environments
            const textArea = document.createElement("textarea");
            textArea.value = dlNumber;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); } catch (err) { console.error('Fallback copy failed', err); }
            document.body.removeChild(textArea);
        }
        
        setAlertMsg("DL copied to clipboard! Opening Kansas DOR website.");
        setTimeout(() => window.open('https://www.kdor.ks.gov/Apps/DLStatus/login.aspx', '_blank'), 1500);
      };

      const generateSummaryText = () => {
        let text = `=== QUICK QUOTE INTAKE ===\n\n`;
        text += `[NAMED INSUREDS]\n`;
        text += `1: ${insured.first1} ${insured.last1} | DOB: ${insured.dob1} | DL: ${insured.dl1} | SSN: ${insured.ssn1} | Ph: ${insured.phone1} | Email: ${insured.email1}\n`;
        if (insured.first2) text += `2: ${insured.first2} ${insured.last2} | DOB: ${insured.dob2} | DL: ${insured.dl2} | SSN: ${insured.ssn2} | Ph: ${insured.phone2} | Email: ${insured.email2}\n`;
        text += `Address: ${insured.address}\n\n`;

        if (drivers.length > 0) {
          text += `[ADDITIONAL DRIVERS]\n`;
          drivers.forEach((d, i) => { text += `Driver ${i+3}: ${d.first} ${d.last} | DOB: ${d.dob} | DL: ${d.dl} | Ph: ${d.phone}\n`; });
          text += `\n`;
        }

        text += `[VEHICLES]\n`;
        vehicles.forEach((v, i) => { text += `Veh ${i+1}: ${v.year} ${v.make} ${v.model} | VIN: ${v.vin} | Cov: ${v.coverage}\n`; });
        text += `\n`;

        text += `[PRIOR INSURANCE]\n`;
        text += `Company: ${priorIns.company} | Premium: $${priorIns.premium}\n\n`;

        const finalRoof = home.roofMaterial === 'Other' ? home.roofMaterialOther : home.roofMaterial;

        text += `[HOME DETAILS]\n`;
        text += `Address: ${home.address || insured.address}\n`;
        text += `SqFt: ${home.sqft} | Rep Cost: ${home.replacementCost} | Age: ${home.age} | Siding: ${home.siding} | Roof Mat: ${finalRoof}\n`;
        text += `Basement: ${home.basement} (Finished: ${home.finishedBasement})\n`;
        text += `Wood Stove: ${home.woodStove} | Detached Structures: ${home.detached} (${home.detachedDesc})\n`;
        text += `Updates -> Elec: ${home.updateElec}, Plumb: ${home.updatePlumb}, HVAC: ${home.updateHvac}, Roof: ${home.updateRoof}\n`;
        if (home.notes) text += `Home Notes: ${home.notes}\n`;
        text += `\n`;

        text += `[CROSS-SELL & NOTES]\n`;
        text += `Term Life: ${crossSell.termLife}\n`;
        text += `Motorcycle/ATV: ${crossSell.powersports}\n`;
        text += `Overall Notes: ${overallNotes}\n`;

        return text;
      };

      const copyToClipboard = () => {
        const summary = generateSummaryText();
        
        if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(summary)
            .then(() => setAlertMsg("Copied to clipboard! You can now paste this into an email, EPIC, or a document."))
            .catch(e => console.error(e));
        } else {
            // Fallback for iFrame environments
            const textArea = document.createElement("textarea");
            textArea.value = summary;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); setAlertMsg("Copied to clipboard!"); } 
            catch (err) { setAlertMsg('Copy failed.'); }
            document.body.removeChild(textArea);
        }
      };

      const sendViaEmail = () => {
        if (!insured.last1 || !insured.first1) {
          setAlertMsg("Please fill out at least the Primary Insured's First and Last Name.");
          return;
        }

        let folderNameStr = `${insured.last1}, ${insured.first1}`;
        if (insured.first2) {
          folderNameStr += ` & ${insured.first2}`;
        }

        const subject = encodeURIComponent(`[QuickQuote] ${folderNameStr}`);
        const body = encodeURIComponent(generateSummaryText());
        const mailtoLink = `mailto:${AUTOMATION_EMAIL}?cc=${CSR_EMAIL}&subject=${subject}&body=${body}`;
        
        const linkElement = document.createElement('a');
        linkElement.href = mailtoLink;
        linkElement.target = '_top'; 
        document.body.appendChild(linkElement);
        linkElement.click();
        document.body.removeChild(linkElement);
        
        setShowSummary(false);
      };

      const handleGlobalKeyDown = (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          const focusable = Array.from(document.querySelectorAll('input:not([disabled]), select:not([disabled]), textarea:not([disabled])'));
          const index = focusable.indexOf(e.target);
          if (index > -1 && index < focusable.length - 1) {
            focusable[index + 1].focus();
          }
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-slate-800" onKeyDown={handleGlobalKeyDown}>
          
          {/* Custom Message Box (Replaces generic alerts) */}
          {alertMsg && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[100]">
              <div className="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full text-center border-t-4 border-[#D4AF37]">
                <p className="text-lg font-bold text-slate-800 mb-6">{alertMsg}</p>
                <button onClick={() => setAlertMsg('')} className="bg-black text-white px-6 py-2 rounded-lg font-bold w-full hover:bg-gray-800 transition-colors">OK</button>
              </div>
            </div>
          )}

          <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border border-slate-200">
            
            {/* Branded Header (Black and Gold) */}
            <div className="bg-black border-t-4 border-[#D4AF37] text-white p-5 md:p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                {/* Logo Placeholder: Save your screenshot as "logo.jpg" in the same folder */}
                <img 
                  src="logo.jpg" 
                  alt="FUMA Logo" 
                  className="h-12 md:h-14 w-auto object-contain bg-white p-1 rounded shadow-sm" 
                  onError={(e) => { e.target.style.display = 'none'; }} 
                />
                <div>
                  <h1 className="text-2xl md:text-3xl font-bold flex items-center gap-2">
                    QuickQuote Pro
                  </h1>
                  <p className="text-gray-300 text-sm mt-1 tracking-wide font-medium">Farmers Union Midwest Agency</p>
                </div>
              </div>
              <button onClick={() => setShowSummary(true)} className="bg-[#D4AF37] hover:bg-[#b5952f] w-full md:w-auto text-black px-6 py-2.5 rounded-lg font-extrabold flex items-center justify-center gap-2 transition-colors shadow-md">
                <CheckCircle className="w-5 h-5" /> Finish Quote
              </button>
            </div>

            <div className="p-6 space-y-8">
              {/* Primary Address Section */}
              <section>
                <h2 className="text-xl font-bold border-b pb-2 mb-4 flex items-center gap-2 text-black"><MapPin className="w-6 h-6 text-[#D4AF37]" /> Primary Address</h2>
                <div className="relative" ref={suggestionRef}>
                  <input placeholder="Start typing household primary address..." className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none w-full font-medium" value={insured.address} onChange={handleAddressChange} />
                  {showSuggestions && addressSuggestions.length > 0 && (
                    <ul className="absolute z-10 w-full bg-white border border-slate-200 mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                      {addressSuggestions.map((item, idx) => (
                        <li key={idx} onClick={() => handleSelectAddress(item)} className="p-3 hover:bg-yellow-50 cursor-pointer border-b last:border-b-0 text-sm text-slate-700">{item.display_name}</li>
                      ))}
                    </ul>
                  )}
                </div>
                <div className="flex flex-col md:flex-row md:items-center gap-3 mt-3 p-3 bg-gray-50 rounded-lg border border-[#D4AF37]/30">
                  <span className="text-sm font-bold text-black">Quick Look-up:</span>
                  <div className="flex gap-2">
                    <button onClick={handleRealtorLookup} className="bg-white border border-gray-300 text-black px-3 py-1.5 rounded hover:bg-yellow-50 flex items-center justify-center gap-1 text-sm font-bold transition-colors flex-grow md:flex-grow-0"><Home className="w-4 h-4"/> Realtor.com</button>
                  </div>
                  <div className="flex items-center gap-2 md:ml-auto">
                    {detectedCounty && <span className="text-xs text-slate-600 font-semibold bg-white px-2 py-1 rounded border border-gray-300">{detectedCounty} County detected</span>}
                    <button onClick={handleCountyLookup} className="bg-black text-white px-3 py-1.5 rounded hover:bg-gray-800 flex items-center justify-center gap-1 text-sm font-bold transition-colors whitespace-nowrap"><ExternalLink className="w-4 h-4"/> Parcel Search</button>
                  </div>
                </div>
              </section>

              {/* Insured Section */}
              <section>
                <h2 className="text-xl font-bold border-b pb-2 mb-4 flex items-center gap-2 text-black"><User className="w-6 h-6 text-[#D4AF37]" /> Named Insureds</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <input placeholder="Primary Insured First Name" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.first1} onChange={e => setInsured({...insured, first1: e.target.value})} />
                  <input placeholder="Primary Insured Last Name" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.last1} onChange={e => setInsured({...insured, last1: e.target.value})} />
                  <input placeholder="DOB (MMDDYYYY)" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.dob1} onChange={e => setInsured({...insured, dob1: formatDOB(e.target.value)})} />
                  <div className="flex gap-2">
                    <input placeholder="Drivers License" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none w-full" value={insured.dl1} onChange={e => setInsured({...insured, dl1: e.target.value})} />
                    <button onClick={() => handleMvrLookup(insured.dl1)} className="bg-black text-white px-3 rounded hover:bg-gray-800 flex items-center justify-center gap-1 font-semibold text-sm whitespace-nowrap transition-colors"><ExternalLink className="w-4 h-4"/> KS MVR</button>
                  </div>
                  <input placeholder="Social Security Number" type="password" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.ssn1} onChange={e => setInsured({...insured, ssn1: e.target.value})} />
                  <input placeholder="Phone Number" type="tel" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.phone1} onChange={e => setInsured({...insured, phone1: e.target.value})} />
                  <input placeholder="Email Address" type="email" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.email1} onChange={e => setInsured({...insured, email1: e.target.value})} />
                  
                  <div className="md:col-span-2 mt-4 border-t pt-4"><p className="text-sm font-bold text-black mb-2">2nd Named Insured (Optional)</p></div>
                  <input placeholder="2nd Insured First Name" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.first2} onChange={e => setInsured({...insured, first2: e.target.value})} />
                  <input placeholder="2nd Insured Last Name" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.last2} onChange={e => setInsured({...insured, last2: e.target.value})} />
                  <input placeholder="DOB (MMDDYYYY)" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.dob2} onChange={e => setInsured({...insured, dob2: formatDOB(e.target.value)})} />
                  <div className="flex gap-2">
                    <input placeholder="Drivers License" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none w-full" value={insured.dl2} onChange={e => setInsured({...insured, dl2: e.target.value})} />
                    <button onClick={() => handleMvrLookup(insured.dl2)} className="bg-black text-white px-3 rounded hover:bg-gray-800 flex items-center justify-center gap-1 font-semibold text-sm whitespace-nowrap transition-colors"><ExternalLink className="w-4 h-4"/> KS MVR</button>
                  </div>
                  <input placeholder="Social Security Number" type="password" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.ssn2} onChange={e => setInsured({...insured, ssn2: e.target.value})} />
                  <input placeholder="Phone Number" type="tel" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.phone2} onChange={e => setInsured({...insured, phone2: e.target.value})} />
                  <input placeholder="Email Address" type="email" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={insured.email2} onChange={e => setInsured({...insured, email2: e.target.value})} />
                </div>
              </section>

              {/* Additional Drivers */}
              <section>
                <h2 className="text-xl font-bold border-b pb-2 mb-4 flex items-center justify-between text-black">
                  <span className="flex items-center gap-2"><Users className="w-6 h-6 text-[#D4AF37]" /> Additional Drivers</span>
                  <button onClick={addDriver} className="text-sm bg-gray-100 text-black border border-gray-300 px-3 py-1.5 rounded-full flex items-center gap-1 font-bold hover:bg-yellow-50 hover:border-[#D4AF37] transition-colors"><Plus className="w-4 h-4"/> Add Driver</button>
                </h2>
                {drivers.map((driver, index) => (
                  <div key={index} className="grid grid-cols-1 md:grid-cols-5 gap-3 bg-gray-50 p-4 rounded-lg mb-3 relative border border-gray-200">
                    <button onClick={() => removeDriver(index)} className="absolute top-2 right-2 text-red-500 hover:text-red-700"><Trash2 className="w-5 h-5"/></button>
                    <input placeholder="First Name" className="border p-2 rounded bg-white focus:ring-2 ring-[#D4AF37] outline-none" value={driver.first} onChange={e => updateDriver(index, 'first', e.target.value)} />
                    <input placeholder="Last Name" className="border p-2 rounded bg-white focus:ring-2 ring-[#D4AF37] outline-none" value={driver.last} onChange={e => updateDriver(index, 'last', e.target.value)} />
                    <input placeholder="DOB (MMDDYYYY)" inputMode="numeric" className="border p-2 rounded bg-white focus:ring-2 ring-[#D4AF37] outline-none" value={driver.dob} onChange={e => updateDriver(index, 'dob', formatDOB(e.target.value))} />
                    <div className="flex gap-1">
                      <input placeholder="Drivers License" className="border p-2 rounded bg-white focus:ring-2 ring-[#D4AF37] outline-none w-full" value={driver.dl} onChange={e => updateDriver(index, 'dl', e.target.value)} />
                      <button onClick={() => handleMvrLookup(driver.dl)} className="bg-black text-white px-2 rounded hover:bg-gray-800 flex items-center justify-center gap-1 text-xs font-semibold whitespace-nowrap" title="KS MVR"><ExternalLink className="w-3 h-3"/> MVR</button>
                    </div>
                    <input placeholder="Phone" type="tel" className="border p-2 rounded bg-white focus:ring-2 ring-[#D4AF37] outline-none" value={driver.phone} onChange={e => updateDriver(index, 'phone', e.target.value)} />
                  </div>
                ))}
                {drivers.length === 0 && <p className="text-slate-400 text-sm italic">No additional drivers added.</p>}
              </section>

              {/* Vehicles */}
              <section>
                <h2 className="text-xl font-bold border-b pb-2 mb-4 flex items-center justify-between text-black">
                  <span className="flex items-center gap-2"><Car className="w-6 h-6 text-[#D4AF37]" /> Vehicles</span>
                  <button onClick={addVehicle} className="text-sm bg-gray-100 text-black border border-gray-300 px-3 py-1.5 rounded-full flex items-center gap-1 font-bold hover:bg-yellow-50 hover:border-[#D4AF37] transition-colors"><Plus className="w-4 h-4"/> Add Vehicle</button>
                </h2>
                {vehicles.map((veh, index) => (
                  <div key={index} className="bg-gray-50 p-4 rounded-lg mb-4 relative border border-gray-200">
                    {index > 0 && <button onClick={() => removeVehicle(index)} className="absolute top-2 right-2 text-red-500 hover:text-red-700"><Trash2 className="w-5 h-5"/></button>}
                    <div className="flex flex-col md:flex-row gap-2 mb-3">
                      <input placeholder="Enter VIN" className="border p-3 rounded flex-grow font-mono uppercase focus:ring-2 ring-[#D4AF37] outline-none" value={veh.vin} onChange={e => updateVehicle(index, 'vin', e.target.value)} />
                      <button onClick={() => decodeVin(index, veh.vin)} className="bg-black text-white px-4 py-3 rounded flex items-center justify-center gap-2 hover:bg-gray-800 font-bold transition-colors"><Search className="w-4 h-4"/> Decode VIN</button>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                      <input placeholder="Year" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={veh.year} onChange={e => updateVehicle(index, 'year', e.target.value)} />
                      <input placeholder="Make" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={veh.make} onChange={e => updateVehicle(index, 'make', e.target.value)} />
                      <input placeholder="Model" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={veh.model} onChange={e => updateVehicle(index, 'model', e.target.value)} />
                      <select className="border p-2 rounded font-semibold bg-white cursor-pointer focus:ring-2 ring-[#D4AF37] outline-none" value={veh.coverage} onChange={e => updateVehicle(index, 'coverage', e.target.value)}>
                        <option value="Liability">Liability Only</option><option value="Full Coverage">Full Coverage</option>
                      </select>
                    </div>
                  </div>
                ))}
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                  <input placeholder="Current Insurance Company" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={priorIns.company} onChange={e => setPriorIns({...priorIns, company: e.target.value})} />
                  <input placeholder="Current Premium ($)" type="number" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={priorIns.premium} onChange={e => setPriorIns({...priorIns, premium: e.target.value})} />
                </div>
              </section>

              {/* Home Section */}
              <section>
                <h2 className="text-xl font-bold border-b pb-2 mb-4 flex items-center gap-2 text-black"><Home className="w-6 h-6 text-[#D4AF37]" /> Homeowners Info</h2>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  <input placeholder="Home Address (if different)" className="border p-3 rounded bg-slate-50 col-span-2 md:col-span-4 focus:ring-2 ring-[#D4AF37] outline-none" value={home.address} onChange={e => setHome({...home, address: e.target.value})} />
                  <input placeholder="Square Footage" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.sqft} onChange={e => setHome({...home, sqft: e.target.value})} />
                  <input placeholder="Est. Replacement Cost" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.replacementCost} onChange={e => setHome({...home, replacementCost: e.target.value})} />
                  <input placeholder="Year Built / Age" inputMode="numeric" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.age} onChange={e => setHome({...home, age: e.target.value})} />
                  
                  {/* Siding Dropdown */}
                  <select className={`border p-3 rounded outline-none focus:ring-2 ring-[#D4AF37] ${!home.siding ? 'text-slate-400 bg-slate-50' : 'text-slate-800 bg-white font-semibold'}`} value={home.siding} onChange={e => setHome({...home, siding: e.target.value})}>
                    <option value="" disabled>Select Siding...</option>
                    <option value="Brick">Brick</option>
                    <option value="Clapboard">Clapboard</option>
                    <option value="EFIS">EFIS</option>
                    <option value="Hard Board">Hard Board</option>
                    <option value="Masonite">Masonite</option>
                    <option value="Smart Siding">Smart Siding</option>
                    <option value="Stone/Masonry">Stone/Masonry</option>
                    <option value="T-111">T-111</option>
                  </select>

                  {/* Roof Dropdown */}
                  <select className={`border p-3 rounded outline-none focus:ring-2 ring-[#D4AF37] ${!home.roofMaterial ? 'text-slate-400 bg-slate-50' : 'text-slate-800 bg-white font-semibold'}`} value={home.roofMaterial} onChange={e => setHome({...home, roofMaterial: e.target.value})}>
                    <option value="" disabled>Select Roof...</option>
                    <option value="Architectural Shingles">Architectural Shingles</option>
                    <option value="Asphalt / 3 Tab Shingles">Asphalt / 3 Tab Shingles</option>
                    <option value="Flat Roof">Flat Roof</option>
                    <option value="Metal">Metal</option>
                    <option value="Other">Other</option>
                  </select>

                  {/* Custom Roof Input (Only shows if 'Other' is selected) */}
                  {home.roofMaterial === 'Other' && (
                    <input placeholder="Describe Other Roof..." className="border p-3 rounded bg-slate-50 col-span-2 md:col-span-2 focus:ring-2 ring-[#D4AF37] outline-none" value={home.roofMaterialOther} onChange={e => setHome({...home, roofMaterialOther: e.target.value})} />
                  )}
                  
                  <div className="border p-2 rounded bg-slate-50 focus-within:ring-2 ring-[#D4AF37]">
                    <label className="text-xs text-slate-500 block font-semibold">Basement?</label>
                    <select className="w-full bg-transparent font-semibold mt-1 outline-none cursor-pointer" value={home.basement} onChange={e => setHome({...home, basement: e.target.value})}><option>No</option><option>Yes</option></select>
                  </div>
                  <div className="border p-2 rounded bg-slate-50 focus-within:ring-2 ring-[#D4AF37]">
                    <label className="text-xs text-slate-500 block font-semibold">Finished Bsmt?</label>
                    <select className="w-full bg-transparent font-semibold mt-1 outline-none cursor-pointer" value={home.finishedBasement} onChange={e => setHome({...home, finishedBasement: e.target.value})}><option>No</option><option>Yes</option></select>
                  </div>
                  <div className="border p-2 rounded bg-slate-50 focus-within:ring-2 ring-[#D4AF37]">
                    <label className="text-xs text-slate-500 block font-semibold">Wood Stove?</label>
                    <select className="w-full bg-transparent font-semibold mt-1 outline-none cursor-pointer" value={home.woodStove} onChange={e => setHome({...home, woodStove: e.target.value})}><option>No</option><option>Yes</option></select>
                  </div>
                  <div className="border p-2 rounded bg-slate-50 focus-within:ring-2 ring-[#D4AF37]">
                    <label className="text-xs text-slate-500 block font-semibold">Detached Struct?</label>
                    <select className="w-full bg-transparent font-semibold mt-1 outline-none cursor-pointer" value={home.detached} onChange={e => setHome({...home, detached: e.target.value})}><option>No</option><option>Yes</option></select>
                  </div>
                  {home.detached === 'Yes' && <input placeholder="Describe detached structures..." className="border p-3 rounded bg-slate-50 col-span-2 md:col-span-3 focus:ring-2 ring-[#D4AF37] outline-none" value={home.detachedDesc} onChange={e => setHome({...home, detachedDesc: e.target.value})} />}

                  <div className="col-span-2 md:col-span-4 mt-2">
                    <p className="text-sm font-bold text-black mb-2">Updates Completed (Enter Years)</p>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                      <input placeholder="Electrical" className="border p-2 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.updateElec} onChange={e => setHome({...home, updateElec: e.target.value})} />
                      <input placeholder="Plumbing" className="border p-2 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.updatePlumb} onChange={e => setHome({...home, updatePlumb: e.target.value})} />
                      <input placeholder="HVAC" className="border p-2 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.updateHvac} onChange={e => setHome({...home, updateHvac: e.target.value})} />
                      <input placeholder="Roof" className="border p-2 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={home.updateRoof} onChange={e => setHome({...home, updateRoof: e.target.value})} />
                    </div>
                  </div>
                  <textarea placeholder="Additional Home Notes..." className="border p-3 rounded bg-slate-50 col-span-2 md:col-span-4 h-20 focus:ring-2 ring-[#D4AF37] outline-none" value={home.notes} onChange={e => setHome({...home, notes: e.target.value})} />
                </div>
              </section>

              <section>
                <h2 className="text-xl font-bold border-b pb-2 mb-4 flex items-center gap-2 text-black"><FileText className="w-6 h-6 text-[#D4AF37]" /> Cross-Sell & Overall Notes</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <input placeholder="Term Life Interests/Notes" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={crossSell.termLife} onChange={e => setCrossSell({...crossSell, termLife: e.target.value})} />
                  <input placeholder="Motorcycle / ATV / Boats" className="border p-3 rounded bg-slate-50 focus:ring-2 ring-[#D4AF37] outline-none" value={crossSell.powersports} onChange={e => setCrossSell({...crossSell, powersports: e.target.value})} />
                  <textarea placeholder="Account-level notes, concerns, budget..." className="border p-3 rounded bg-slate-50 md:col-span-2 h-24 focus:ring-2 ring-[#D4AF37] outline-none" value={overallNotes} onChange={e => setOverallNotes(e.target.value)} />
                </div>
              </section>
            </div>
          </div>

          {/* SUMMARY MODAL */}
          {showSummary && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col">
                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                  <h3 className="text-xl font-bold text-black">Intake Summary</h3>
                  <button onClick={() => setShowSummary(false)} className="text-slate-500 hover:text-black text-2xl leading-none transition-colors">&times;</button>
                </div>
                <div className="p-4 flex-grow overflow-y-auto">
                  <pre className="bg-slate-100 p-4 rounded text-sm text-slate-800 whitespace-pre-wrap font-mono border border-slate-300">
                    {generateSummaryText()}
                  </pre>
                </div>
                <div className="p-4 border-t bg-gray-50 rounded-b-xl flex flex-col md:flex-row justify-end gap-3">
                  <button onClick={copyToClipboard} className="px-4 py-2 text-black bg-white font-bold hover:bg-yellow-50 rounded border border-gray-300 md:mr-auto transition-colors">Copy to Clipboard</button>
                  <button onClick={() => setShowSummary(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded transition-colors">Edit Data</button>
                  <button onClick={sendViaEmail} className="bg-[#D4AF37] hover:bg-[#C5A017] text-black px-6 py-2 rounded font-extrabold flex items-center justify-center gap-2 shadow-md transition-colors">
                    <Mail className="w-5 h-5"/> Send via Email
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
