    // FIREBASE INITIALIZATION 
    const firebaseConfig = {
      apiKey: "AIzaSyC7GAOJOpLw-oLVC9c-Z9IuhqZ8GEZq-FY",
      authDomain: "quickquote-pro-7f4e7.firebaseapp.com",
      projectId: "quickquote-pro-7f4e7",

    // !!! CONFIGURE YOUR EMAILS HERE !!!
    const AUTOMATION_EMAIL = "zteske@fumainsurance.com"; 
    const CSR_EMAIL = "office.ks@fumainsurance.com";

    const App = () => {
      const [appStep, setAppStep] = useState('selection'); // 'selection', 'entry', 'success'
      const [selectedCats, setSelectedCats] = useState([]);
      const [isClientMode, setIsClientMode] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      
      const [smsInfo, setSmsInfo] = useState({ name: '', phone: '' });

      const [insured, setInsured] = useState({
        first1: '', last1: '', ssn1: '', dob1: '', dl1: '', dlState1: 'KS', phone1: '', email1: '', address: '',
        first2: '', last2: '', ssn2: '', dob2: '', dl2: '', dlState2: 'KS', phone2: '', email2: ''
      });

      // Inspection Specific State
      const [inspection, setInspection] = useState({
        location: '', currentAddress: '', closingDate: '', price: '', roofAge: '', mortgage: 'Yes', autoBundle: 'No'
      });
      
      const [drivers, setDrivers] = useState([]);
      const [vehicles, setVehicles] = useState([{ vin: '', year: '', make: '', model: '', coverage: 'Liability Only', deductible: '' }]);
      const [cycleVehicles, setCycleVehicles] = useState([]);
      const [camperVehicles, setCamperVehicles] = useState([]);
      const [watercraft, setWatercraft] = useState([]);
      const [commAutoVehicles, setCommAutoVehicles] = useState([]);
      
      // Farm State
      const [farmNoDwelling, setFarmNoDwelling] = useState(false);
      const [farmLocations, setFarmLocations] = useState([]);
      const [farmOutbuildings, setFarmOutbuildings] = useState([]);
      const [farmProperty, setFarmProperty] = useState([]);

      const [home, setHome] = useState({
        address: '', sqft: '', replacementCost: '', style: '', styleOther: '', basement: 'No', finishedBasement: 'No',
        woodStove: 'No', detached: 'No', detachedDesc: '', age: '', mortgage: 'Yes', siding: '',
        updateElec: '', updatePlumb: '', updateHvac: '', updateRoof: '', roofMaterial: '', roofMaterialOther: '', notes: ''
      });

      const [business, setBusiness] = useState({
        name: '', entity: '', fein: '', yearStarted: '', address: '', operations: '', employeesFt: '', employeesPt: '', payroll: '', income: '', classCode: '', losses: '', carrier: '', premium: '', renewalDate: ''
      });
      const [wcCodes, setWcCodes] = useState([]);
      
      const [naicsSearch, setNaicsSearch] = useState('');
      const [showNaicsList, setShowNaicsList] = useState(false);

      const [life, setLife] = useState({ amount: '', term: '', healthNotes: '' });
      const [overallNotes, setOverallNotes] = useState('');
      
      // UI Modals State
      const [showSummary, setShowSummary] = useState(false);
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const [alertMsg, setAlertMsg] = useState('');

      // Autocomplete state
      const [addressSuggestions, setAddressSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [detectedCounty, setDetectedCounty] = useState(''); 
      const [addressQuery, setAddressQuery] = useState(''); 
      const [activeAddressField, setActiveAddressField] = useState(null); 

      const suggestionRef = useRef(null);
      const locationRef = useRef(null);
      const currentAddressRef = useRef(null);
      const naicsRef = useRef(null);

      // --- Database Initialization ---
      useEffect(() => {
        // Initialize Firebase once the external module script sets it on the window
        const initDB = () => {
          if (window.FirebaseAPI && !window.firebaseAppInstance) {
            window.firebaseAppInstance = window.FirebaseAPI.initializeApp(firebaseConfig);
            window.dbInstance = window.FirebaseAPI.getFirestore(window.firebaseAppInstance);
          }
        };
        // Small delay to ensure module script executes
        setTimeout(initDB, 500);
      }, []);

      // --- URL Parameter Logic (Client Shareable Link) ---
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'client') {
          setSelectedCats(['inspection']);
          setAppStep('entry');
          setIsClientMode(true);
        }
      }, []);

      // --- Effects & Lookups ---
      useEffect(() => {
        const handleClickOutside = (event) => {
          if (suggestionRef.current && !suggestionRef.current.contains(event.target) &&
              locationRef.current && !locationRef.current.contains(event.target) &&
              currentAddressRef.current && !currentAddressRef.current.contains(event.target)) {
            setShowSuggestions(false);
            setActiveAddressField(null);
          }
          if (naicsRef.current && !naicsRef.current.contains(event.target)) setShowNaicsList(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      useEffect(() => {
        const controller = new AbortController();
        const timeoutId = setTimeout(async () => {
          if (addressQuery.length > 5) {
            try {
              const kansasViewBox = "-102.05,40.00,-94.58,36.99";
              const url = `https://nominatim.openstreetmap.org/search?format=json&countrycodes=us&addressdetails=1&viewbox=${kansasViewBox}&bounded=1&email=ks.insurance.app.test@gmail.com&q=${encodeURIComponent(addressQuery)}`;
              const response = await fetch(url, { signal: controller.signal });
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              const data = await response.json();
              setAddressSuggestions(data);
              setShowSuggestions(true);
            } catch (error) {
              if (error.name !== 'AbortError') console.error("Error fetching address:", error);
            }
          } else {
            setShowSuggestions(false);
          }
        }, 800);
        return () => { clearTimeout(timeoutId); controller.abort(); };
      }, [addressQuery]);

      const handleAddressChange = (e, fieldName) => {
        const query = e.target.value;
        setAddressQuery(query);
        setActiveAddressField(fieldName);
        
        if (fieldName === 'primary') {
          setInsured({ ...insured, address: query });
        } else if (fieldName === 'location') {
          setInspection({ ...inspection, location: query });
        } else if (fieldName === 'current') {
          setInspection({ ...inspection, currentAddress: query });
        }
      };

      const handleSelectAddress = (item) => {
        const name = item.display_name;
        
        if (activeAddressField === 'primary') {
          setInsured({ ...insured, address: name });
          setHome({ ...home, address: name });
          if (item.address && item.address.county) {
            setDetectedCounty(item.address.county.replace(' County', '').trim());
          } else {
            setDetectedCounty('');
          }
        } else if (activeAddressField === 'location') {
          setInspection({ ...inspection, location: name });
        } else if (activeAddressField === 'current') {
          setInspection({ ...inspection, currentAddress: name });
        }
        
        setShowSuggestions(false);
        setActiveAddressField(null);
      };

      const handleRealtorLookup = () => {
        if (!insured.address) return setAlertMsg("Please enter an address first.");
        window.open(`https://www.realtor.com/realestateandhomes-search/${encodeURIComponent(insured.address)}`, '_blank');
      };

      const handleCountyLookup = () => {
        if (!insured.address) return setAlertMsg("Please enter an address first.");
        let countyUrl = "";
        if (detectedCounty === "Riley") countyUrl = `http://www.riley.kansasgov.com/parcel/`; 
        else if (detectedCounty === "Pottawatomie") countyUrl = `https://pottawatomie.kansasgov.com/parcel/`;
        else if (detectedCounty === "Marshall") countyUrl = `http://www.marshall.kansasgov.com/parcel/`;
        else if (detectedCounty === "Nemaha") countyUrl = `http://ks-nemaha.manatron.com/`;
        else if (detectedCounty === "Wabaunsee") countyUrl = `https://ks1052.cichosting.com/webportal/Login.aspx`;
        else if (detectedCounty === "Jackson") countyUrl = `https://jackson.kansasgov.com/parcel/`;
        else {
          const searchTerms = detectedCounty ? `${detectedCounty} county KS property search` : "county property search";
          countyUrl = `https://www.google.com/search?q=${encodeURIComponent(insured.address + " " + searchTerms)}`;
        }
        window.open(countyUrl, '_blank');
      };

      const handleMvrLookup = (dlNumber) => {
        if (!dlNumber) return setAlertMsg("Please enter a Driver's License number first.");
        
        if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(dlNumber).catch(e => console.error("Clipboard copy failed", e));
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = dlNumber;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); } catch (err) { console.error('Fallback copy failed', err); }
            document.body.removeChild(textArea);
        }
        
        setAlertMsg("DL copied to clipboard! Opening Kansas DOR website.");
        setTimeout(() => window.open('https://www.kdor.ks.gov/Apps/DLStatus/login.aspx', '_blank'), 1500);
      };

      const handleSendSms = () => {
        if (!smsInfo.phone) return setAlertMsg("Please enter a phone number.");
        const baseUrl = window.location.href.split('?')[0];
        const link = `${baseUrl}?mode=client`;
        const message = `Hi ${smsInfo.name}, it was great meeting you! You can use this secure link to quickly provide the details for your insurance quotes: ${link}`;
        
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        const sep = isIOS ? '&' : '?';
        window.location.href = `sms:${smsInfo.phone}${sep}body=${encodeURIComponent(message)}`;
      };

      // --- Form Actions ---
      const clearAllFields = () => {
        setInsured({ first1: '', last1: '', ssn1: '', dob1: '', dl1: '', dlState1: 'KS', phone1: '', email1: '', address: '', first2: '', last2: '', ssn2: '', dob2: '', dl2: '', dlState2: 'KS', phone2: '', email2: '' });
        setInspection({ location: '', currentAddress: '', closingDate: '', price: '', roofAge: '', mortgage: 'Yes', autoBundle: 'No' });
        setDrivers([]);
        setVehicles([{ vin: '', year: '', make: '', model: '', coverage: 'Liability Only', deductible: '' }]);
        setCycleVehicles([]);
        setCamperVehicles([]);
        setWatercraft([]);
        setCommAutoVehicles([]);
        setFarmNoDwelling(false);
        setFarmLocations([]);
        setFarmOutbuildings([]);
        setFarmProperty([]);
        setHome({ address: '', sqft: '', replacementCost: '', style: '', styleOther: '', basement: 'No', finishedBasement: 'No', woodStove: 'No', detached: 'No', detachedDesc: '', age: '', mortgage: 'Yes', siding: '', updateElec: '', updatePlumb: '', updateHvac: '', updateRoof: '', roofMaterial: '', roofMaterialOther: '', notes: '' });

          setAppStep('entry');

      };

        setSelectedCats(prev => prev.includes(id) ? prev.filter(c => c !== id) : [...prev, id]);

      const formatDOB = (value) => {
        const v = value.replace(/\D/g, '').slice(0, 8);
        if (v.length >= 5) return `${v.slice(0, 2)}/${v.slice(2, 4)}/${v.slice(4)}`;
        else if (v.length >= 3) return `${v.slice(0, 2)}/${v.slice(2)}`;
        return v;
      };

      const formatCurrency = (val) => {
        const num = val.replace(/\D/g, '');
        if (!num) return '';
        return '$' + parseInt(num, 10).toLocaleString('en-US');
      };

        const newDrivers = [...drivers];
        newDrivers[index][field] = value;
        setDrivers(newDrivers);

        const newList = [...list];
        newList[index][field] = value;
        setter(newList);
      };
      
      const addVehicle = (setter, list) => setter([...list, { vin: '', year: '', make: '', model: '', coverage: 'Liability Only', deductible: '', desc: '' }]);

      const decodeVin = async (vin, callback) => {
        if (vin.length !== 17) return setAlertMsg("Please enter a valid 17-character VIN.");
        try {
          const response = await fetch(`https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/${vin}?format=json`);
          const data = await response.json();
          if (data.Results && data.Results.length > 0) {
            const r = data.Results[0];
            callback({ year: r.ModelYear || '', make: r.Make || '', model: r.Model || '' });
          }
        } catch (e) { setAlertMsg("Could not decode VIN. Enter manually."); }
      };

      // Summary Generation
      const generateSummaryText = () => {
        let text = `=== QUICK QUOTE INTAKE ===\n`;
        text += `Categories: ${selectedCats.map(id => CATEGORIES.find(c => c.id === id)?.label).join(', ')}\n\n`;

        if (selectedCats.includes('inspection')) {
          text += `[INSPECTION CLIENT INFO]\nLoc Purchased: ${inspection.location} | Current Addr: ${inspection.currentAddress}\nClosing Date: ${inspection.closingDate} | Purchase Price: ${inspection.price}\nYear Roof Replaced: ${inspection.roofAge} | Mortgage: ${inspection.mortgage}\n\n`;
        }

        text += `[NAMED INSUREDS]\n1: ${insured.first1} ${insured.last1} | DOB: ${insured.dob1} | DL: ${insured.dl1} (${insured.dlState1}) | SSN: ${insured.ssn1}\n`;
        if (insured.first2) text += `2: ${insured.first2} ${insured.last2} | DOB: ${insured.dob2} | DL: ${insured.dl2} (${insured.dlState2}) | SSN: ${insured.ssn2}\n`;
        text += `Phone: ${insured.phone1} | Email: ${insured.email1}\nAddress: ${insured.address}\n\n`;

        if (selectedCats.includes('inspection') && inspection.autoBundle === 'Yes') {
          text += `[INSPECTION AUTO BUNDLE]\nRequested Auto Bundle: YES\n`;
        }

        if (drivers.length > 0) {
          text += `[ADDITIONAL DRIVERS]\n`;
          drivers.forEach((d, i) => text += `${i+3}: ${d.first} ${d.last} | DOB: ${d.dob} | DL: ${d.dl} (${d.dlState}) | Ph: ${d.phone}\n`);
          text += `\n`;
        }

        if ((selectedCats.includes('auto') || (selectedCats.includes('inspection') && inspection.autoBundle === 'Yes')) && vehicles.length > 0) {
          text += `[PERSONAL AUTO]\n`;
          vehicles.forEach(v => text += `${v.year} ${v.make} ${v.model} | VIN: ${v.vin} | Cov: ${v.coverage} ${v.coverage === 'Full Coverage' ? `(Ded: ${v.deductible})` : ''}\n`);
          text += `\n`;
        }

        if (selectedCats.includes('commauto') && commAutoVehicles.length > 0) {
          text += `[COMMERCIAL AUTO]\n`;
          commAutoVehicles.forEach(v => text += `${v.year} ${v.make} ${v.model} ${v.desc ? `(${v.desc})` : ''} | VIN: ${v.vin} | Cov: ${v.coverage} ${v.coverage === 'Full Coverage' ? `(Ded: ${v.deductible})` : ''}\n`);
          text += `\n`;
        }

        if (selectedCats.includes('camper') && camperVehicles.length > 0) {
          text += `[CAMPERS / RVS]\n`;
          camperVehicles.forEach(v => text += `${v.year} ${v.make} ${v.model} | VIN: ${v.vin} | Style: ${v.style} | Length: ${v.length} | Slides: ${v.slides} | Val: $${v.value} | Cov: ${v.coverage} ${v.coverage === 'Full Coverage' ? `(Ded: ${v.deductible})` : ''}\nPrior Carrier: ${v.carrier} ($${v.premium})\n`);
          text += `\n`;
        }

        if (selectedCats.includes('cycle') && cycleVehicles.length > 0) {
          text += `[MOTORCYCLE/ATV]\n`;
          cycleVehicles.forEach(v => text += `${v.year} ${v.make} ${v.model} | VIN: ${v.vin} | CC: ${v.cc} | Cov: ${v.coverage} ${v.coverage === 'Full Coverage' ? `(Ded: ${v.deductible})` : ''}\n`);
          text += `\n`;
        }

        if (selectedCats.includes('watercraft') && watercraft.length > 0) {
          text += `[WATERCRAFT]\n`;
          watercraft.forEach(v => text += `${v.year} ${v.make} ${v.model} | Hull ID: ${v.hullId} | Mat: ${v.material === 'Other' ? v.materialOther : v.material} | Motor: ${v.motorMake} (${v.hp} HP)\nVal: $${v.value} | Cov: ${v.coverage} ${v.coverage === 'Full Coverage' ? `(Ded: ${v.deductible})` : ''}\n`);
          text += `\n`;
        }

        if (selectedCats.includes('home') || (selectedCats.includes('farm') && !farmNoDwelling)) {
          text += `[HOME/DWELLING DETAILS]\nStyle: ${home.style === 'Other' ? home.styleOther : home.style} | Siding: ${home.siding} | Roof: ${home.roofMaterial === 'Other' ? home.roofMaterialOther : home.roofMaterial}\n`;
          text += `SqFt: ${home.sqft} | Rep Cost: $${home.replacementCost} | Year Built: ${home.age} | Mortgage: ${home.mortgage} | Bsmt: ${home.basement} (Finished: ${home.finishedBasement})\n`;
          text += `Wood Stove: ${home.woodStove} | Detached: ${home.detached} (${home.detachedDesc})\n`;
          text += `Updates -> Elec: ${home.updateElec}, Plumb: ${home.updatePlumb}, HVAC: ${home.updateHvac}, Roof: ${home.updateRoof}\n`;
          if (home.notes) text += `Dwelling Notes: ${home.notes}\n`;
          text += `\n`;
        } else if (selectedCats.includes('farm') && farmNoDwelling) {
          text += `[HOME/DWELLING DETAILS]\nNO DWELLING ON POLICY\n\n`;
        }

        if (selectedCats.includes('farm')) {
          text += `[FARM LOCATIONS]\n`;
          farmLocations.forEach((l, i) => text += `Loc ${i+1}${l.isPrimary ? ' (PRIMARY)' : ''}: Sec ${l.section}, Twp ${l.township}, Rng ${l.range} | ${l.acres} Acres (${l.acreType}) | ${l.county} County | Addr: ${l.address}\n`);
          text += `\n[FARM OUTBUILDINGS]\n`;
          farmOutbuildings.forEach((o, i) => text += `Bldg ${i+1}: ${o.structureType === 'Other' ? o.structureOther : o.structureType} | Const: ${o.construction === 'Other' ? o.constructionOther : o.construction} | Floor: ${o.flooring === 'Other' ? o.flooringOther : o.flooring} | Siding: ${o.siding === 'Other' ? o.sidingOther : o.siding} | Roof: ${o.roof === 'Other' ? o.roofOther : o.roof} (Age: ${o.roofAge}) | Style: ${o.style}\nVal: $${o.value} (${o.coverage})\n`);
          text += `\n[FARM SCHEDULED PROPERTY]\n`;
          farmProperty.forEach((p, i) => text += `Item ${i+1}: ${p.year} ${p.make} ${p.model} | Desc: ${p.desc} | Serial: ${p.serial} | Val: $${p.value}\n`);
          text += `\n`;
        }

        if (['bop', 'wc', 'commauto', 'farm'].some(c => selectedCats.includes(c))) {
          text += `[BUSINESS / COMMERCIAL INFO]\nName: ${business.name} | Entity: ${business.entity === 'Other' ? business.entityOther : business.entity} | FEIN: ${business.fein} | Year Started: ${business.yearStarted}\nAddr: ${business.address}\nOps/Desc: ${business.operations} | Class Code: ${business.classCode}\n`;
          text += `Income: $${business.income} | Payroll: $${business.payroll} | Employees: ${business.employeesFt} FT / ${business.employeesPt} PT\n`;
          text += `Losses: ${business.losses}\nPrior Carrier: ${business.carrier} ($${business.premium}) | Renewal: ${business.renewalDate}\n\n`;
        }

        if (selectedCats.includes('wc') && wcCodes.length > 0) {
          text += `[WORK COMP CODES]\n`;
          wcCodes.forEach(c => text += `Code/Desc: ${c.code} ${c.ifAny ? '(IF ANY)' : ''} | Payroll: $${c.payroll} | Emp: ${c.ft} FT / ${c.pt} PT\n`);
          text += `\n`;
        }

        if (selectedCats.includes('life')) {
          text += `[LIFE INSURANCE]\nTarget Amount: $${life.amount} | Term: ${life.term}\nHealth/Tobacco Notes: ${life.healthNotes}\n\n`;
        }

        text += `[OVERALL NOTES]\n${overallNotes}`;
        return text;
      };

      // --- SECURE FIREBASE SUBMISSION WITH CC LOGIC ---
      const submitToDatabase = async () => {
        if (!insured.last1 || !insured.first1) {
          setAlertMsg("Please fill out at least the Primary Insured's First and Last Name.");
          return;
        }

        if (!window.FirebaseAPI || !window.dbInstance) {
          setAlertMsg("Database connection is still initializing. Please try again in a few seconds.");
          return;
        }

        setIsSubmitting(true);

        let folderNameStr = `${insured.last1}, ${insured.first1}`;
        if (insured.first2) {
          folderNameStr += ` & ${insured.first2}`;
        }

        try {
          const { collection, addDoc, serverTimestamp } = window.FirebaseAPI;
          const db = window.dbInstance;

          // Package the payload specifically for the Firebase Trigger Email Extension
          const payload = {
            to: AUTOMATION_EMAIL,
            cc: CSR_EMAIL, // This permanently routes a copy to the VA!
            message: {
              subject: `[QuickQuote] ${folderNameStr}`,
              text: generateSummaryText()
            },
            // Metadata for your records
            timestamp: serverTimestamp(),
            categories: selectedCats,
            clientName: folderNameStr
          };

          // Drop data into the exact 'mail' collection the extension is listening to
          const submissionsRef = collection(db, 'artifacts', 'QuickQuote', 'public', 'data', 'mail');
          await addDoc(submissionsRef, payload);

          // Success! Show Thank You screen
          setShowSummary(false);
          setAppStep('success');

        } catch (error) {
          console.error("Firebase Error:", error);
          setAlertMsg("There was a problem saving your quote. Please check your internet connection and try again.");
        } finally {
          setIsSubmitting(false);
        }
      };

      const copyToClipboard = () => {
        const summary = generateSummaryText();
        if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(summary)
            .then(() => setAlertMsg("Copied to clipboard!"))
            .catch(e => console.error(e));
        } else {
            const textArea = document.createElement("textarea");
            textArea.value = summary;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); setAlertMsg("Copied to clipboard!"); } 
            catch (err) { setAlertMsg('Copy failed.'); }
            document.body.removeChild(textArea);
        }
      };

      // --- Global UI Listeners ---
      useEffect(() => {
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(i => i.setAttribute('enterkeyhint', 'next'));
      }, [appStep, selectedCats]);

      const handleGlobalKeyDown = (e) => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
          const focusable = Array.from(document.querySelectorAll('input:not([disabled]), select:not([disabled]), textarea:not([disabled])'));
          const idx = focusable.indexOf(e.target);
          if (idx > -1 && idx < focusable.length - 1) focusable[idx + 1].focus();
        }
      };

      // --- Render Shared Vehicle Fields ---
      const renderVehicleFields = (v, i, setter, list, hasDesc = false) => (
        <>
          <div className="flex flex-col md:flex-row gap-2 mb-3">
            <input placeholder="VIN" className="border p-3 rounded flex-grow font-mono uppercase focus:ring-2 ring-[#D4AF37] outline-none" value={v.vin} onChange={e => updateListItem(setter, list, i, 'vin', e.target.value)} />
            <button onClick={() => decodeVin(v.vin, (data) => {
              const newList = [...list];
              newList[i] = { ...newList[i], ...data };
              setter(newList);
            })} className="bg-black text-white px-4 rounded font-bold hover:bg-gray-800 transition-colors">Decode</button>
          </div>
          {hasDesc && <input placeholder="Vehicle Description (e.g. Dump Truck, Trailer)" className="border p-2 rounded mb-3 w-full focus:ring-2 ring-[#D4AF37] outline-none" value={v.desc} onChange={e => updateListItem(setter, list, i, 'desc', e.target.value)} />}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <input placeholder="Year" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.year} onChange={e => updateListItem(setter, list, i, 'year', e.target.value)} />
            <input placeholder="Make" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.make} onChange={e => updateListItem(setter, list, i, 'make', e.target.value)} />
            <input placeholder="Model" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.model} onChange={e => updateListItem(setter, list, i, 'model', e.target.value)} />
            <select className="border p-2 rounded font-bold focus:ring-2 ring-[#D4AF37] outline-none bg-white" value={v.coverage} onChange={e => updateListItem(setter, list, i, 'coverage', e.target.value)}>
              <option>Liability Only</option><option>Full Coverage</option>
            </select>
          </div>
          {v.coverage === 'Full Coverage' && (
            <div className="mt-3 bg-yellow-50 p-2 rounded border border-[#D4AF37]/50">
              <label className="text-xs font-bold text-black block mb-1">Comp/Coll Deductible:</label>
              <select className="border p-2 rounded w-full bg-white font-semibold focus:ring-2 ring-[#D4AF37] outline-none" value={v.deductible} onChange={e => updateListItem(setter, list, i, 'deductible', e.target.value)}>
                <option value="" disabled>Select Deductible...</option>
                {DEDUCTIBLES.map(d => <option key={d} value={d}>{d}</option>)}
              </select>
            </div>
          )}
        </>
      );

      // --- RENDER COMPONENTS ---

      if (appStep === 'success') {
        return (
          <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
            <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-[#D4AF37]">
              <CheckCircle className="w-20 h-20 text-[#D4AF37] mx-auto mb-6" />
              <h2 className="text-3xl font-extrabold text-black mb-2">Quote Submitted!</h2>
              <p className="text-gray-600 mb-8">Thank you! Your information has been securely transmitted. Our team will review the details and be in touch shortly with your customized quotes.</p>
              
              {!isClientMode && (
                <button 
                  onClick={() => { clearAllFields(); setAppStep('selection'); }}
                  className="bg-black text-white px-6 py-3 rounded-lg font-bold w-full hover:bg-gray-800 transition-colors"
                >
                  Start New Quote
                </button>
              )}
            </div>
          </div>
        );
      }

      if (appStep === 'selection') {
        return (
          <div className="min-h-screen bg-gray-50 p-4 md:p-8 flex flex-col items-center">
            <div className="max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
              <div className="bg-black text-white p-6 text-center border-b-4 border-[#D4AF37]">
                <h1 className="text-3xl font-bold">QuickQuote Pro</h1>
                <p className="text-gray-400 mt-1 uppercase tracking-widest text-xs font-bold">Farmers Union Midwest Agency</p>
              </div>
              <div className="p-8">
                <h2 className="text-xl font-bold text-gray-800 mb-6 text-center">What type of quote are we working on?</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                  {CATEGORIES.map(cat => (
                    <button 
                      key={cat.id} 
                      onClick={() => toggleCategory(cat.id)}
                      className={`flex items-center gap-3 p-4 rounded-xl border-2 transition-all text-left ${selectedCats.includes(cat.id) ? 'border-[#D4AF37] bg-yellow-50 shadow-md' : 'border-gray-100 bg-gray-50 hover:border-gray-300'}`}
                    >
                      <cat.icon className={`w-6 h-6 ${selectedCats.includes(cat.id) ? 'text-[#D4AF37]' : 'text-gray-400'}`} />
                      <span className={`font-bold ${selectedCats.includes(cat.id) ? 'text-black' : 'text-gray-600'}`}>{cat.label}</span>
                    </button>
                  ))}
                </div>
                <button 
                  disabled={selectedCats.length === 0}
                  onClick={() => setAppStep('entry')}
                  className={`w-full py-4 rounded-xl font-extrabold text-lg shadow-lg transition-all ${selectedCats.length > 0 ? 'bg-black text-[#D4AF37] hover:bg-gray-800 cursor-pointer' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                >
                  START DATA COLLECTION
                </button>

                {/* SMS Link Feature */}
                <div className="mt-10 border-t pt-8">
                  <h3 className="text-lg font-bold text-black mb-2 flex items-center gap-2"><MessageCircle className="w-5 h-5 text-[#D4AF37]"/> Text Link to Client</h3>
                  <p className="text-sm text-gray-500 mb-4">Send a secure link so they can fill out the fast Inspection form on their phone.</p>
                  <div className="flex flex-col sm:flex-row gap-3">
                    <input placeholder="Client Name" className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none flex-grow" value={smsInfo.name} onChange={e => setSmsInfo({...smsInfo, name: e.target.value})} />
                    <input placeholder="Phone Number" type="tel" className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none flex-grow" value={smsInfo.phone} onChange={e => setSmsInfo({...smsInfo, phone: e.target.value})} />
                    <button onClick={handleSendSms} className="bg-[#D4AF37] text-black font-bold px-6 py-3 rounded hover:bg-[#b5952f] transition-colors whitespace-nowrap">Send SMS</button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-slate-800" onKeyDown={handleGlobalKeyDown}>
          {/* Main Alerts */}
          {alertMsg && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[100]">
              <div className="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full text-center border-t-4 border-[#D4AF37]">
                <p className="text-lg font-bold text-slate-800 mb-6">{alertMsg}</p>
                <button onClick={() => setAlertMsg('')} className="bg-black text-white px-6 py-2 rounded-lg font-bold w-full hover:bg-gray-800 transition-colors">OK</button>
              </div>
            </div>
          )}

          {/* Clear Form Confirmation */}
          {showClearConfirm && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[100]">
              <div className="bg-white p-6 rounded-xl shadow-xl max-w-sm w-full text-center border-t-4 border-red-500">
                <h3 className="text-xl font-bold text-slate-800 mb-2">Clear All Data?</h3>
                <p className="text-slate-600 mb-6">Are you sure you want to clear the entire form? This cannot be undone.</p>
                <div className="flex gap-3">
                  <button onClick={() => setShowClearConfirm(false)} className="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg font-bold w-full hover:bg-gray-300 transition-colors">Cancel</button>
                  <button onClick={clearAllFields} className="bg-red-500 text-white px-4 py-2 rounded-lg font-bold w-full hover:bg-red-600 transition-colors">Yes, Clear</button>
                </div>
              </div>
            </div>
          )}

          <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border border-slate-200 mb-20">
            <div className="bg-black border-t-4 border-[#D4AF37] text-white p-5 md:p-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex items-center gap-4 cursor-pointer" onClick={() => !isClientMode && setAppStep('selection')}>
                <img src="logo.jpg" alt="FUMA Logo" className="h-12 w-auto bg-white p-1 rounded" onError={e => e.target.style.display = 'none'} />
                <div>
                  <h1 className="text-2xl font-bold">QuickQuote Pro</h1>
                  <p className="text-gray-400 text-xs font-bold uppercase tracking-tight">{isClientMode ? 'Secure Client Portal' : 'Return to Menu'}</p>
                </div>
              </div>
              <button onClick={() => setShowSummary(true)} className="bg-[#D4AF37] hover:bg-[#b5952f] text-black px-6 py-2.5 rounded-lg font-extrabold flex items-center justify-center gap-2 shadow-md transition-colors">
                <CheckCircle className="w-5 h-5" /> Finish & Send
              </button>
            </div>

            <div className="p-6 space-y-10">
              
              {/* === INSPECTION CLIENT CUSTOM FLOW === */}
              {selectedCats.includes('inspection') && (
                <>
                  <section className="bg-white p-4 rounded-lg border-l-4 border-black shadow-sm border border-gray-100">
                    <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-black"><Clipboard className="w-6 h-6 text-[#D4AF37]" /> Inspection Details</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      
                      <div className="relative col-span-1 md:col-span-2" ref={locationRef}>
                        <label className="text-xs text-slate-500 block font-semibold mb-1 uppercase">Location Being Purchased</label>
                        <input placeholder="Start typing address..." className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none w-full" value={inspection.location} onChange={e => handleAddressChange(e, 'location')} />
                        {showSuggestions && activeAddressField === 'location' && addressSuggestions.length > 0 && (
                          <ul className="absolute z-10 w-full bg-white border border-slate-200 mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                            {addressSuggestions.map((item, idx) => (
                              <li key={idx} onClick={() => handleSelectAddress(item)} className="p-3 hover:bg-yellow-50 cursor-pointer border-b last:border-b-0 text-sm text-slate-700">{item.display_name}</li>
                            ))}
                          </ul>
                        )}
                      </div>

                      <div className="relative col-span-1 md:col-span-2" ref={currentAddressRef}>
                        <label className="text-xs text-slate-500 block font-semibold mb-1 uppercase">Current Address (Where you most recently lived)</label>
                        <input placeholder="Start typing address..." className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none w-full" value={inspection.currentAddress} onChange={e => handleAddressChange(e, 'current')} />
                        {showSuggestions && activeAddressField === 'current' && addressSuggestions.length > 0 && (
                          <ul className="absolute z-10 w-full bg-white border border-slate-200 mt-1 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                            {addressSuggestions.map((item, idx) => (
                              <li key={idx} onClick={() => handleSelectAddress(item)} className="p-3 hover:bg-yellow-50 cursor-pointer border-b last:border-b-0 text-sm text-slate-700">{item.display_name}</li>
                            ))}
                          </ul>
                        )}
                      </div>
                      
                      <div className="flex flex-col">
                        <label className="text-xs text-slate-500 block font-semibold mb-1 uppercase">Approximate Closing Date</label>
                        <input type="date" className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none" value={inspection.closingDate} onChange={e => setInspection({...inspection, closingDate: e.target.value})} />
                      </div>

                      <div className="flex flex-col">
                        <label className="text-xs text-slate-500 block font-semibold mb-1 uppercase">Purchase Price</label>
                        <input type="text" inputMode="numeric" placeholder="$0" className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none" value={inspection.price} onChange={e => setInspection({...inspection, price: formatCurrency(e.target.value)})} />
                      </div>
                      
                      <div className="flex flex-col">
                        <label className="text-xs text-slate-500 block font-semibold mb-1 uppercase">Year Roof Most Recently Replaced</label>
                        <input inputMode="numeric" maxLength="4" placeholder="YYYY" className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none" value={inspection.roofAge} onChange={e => setInspection({...inspection, roofAge: e.target.value})} />
                      </div>

                      <div className="border p-2 rounded bg-slate-50 focus-within:ring-2 ring-[#D4AF37]">
                        <label className="text-xs text-slate-500 block font-semibold">Will there be a mortgage on property?</label>
                        <select className="w-full bg-transparent font-semibold mt-1 outline-none cursor-pointer" value={inspection.mortgage} onChange={e => setInspection({...inspection, mortgage: e.target.value})}>
                          <option value="Yes">Yes</option>
                          <option value="No">No</option>
                        </select>
                      </div>
                    </div>

                    <div key={i} className="bg-gray-50 p-4 rounded-lg mb-4 relative border border-gray-200">
                      <button onClick={() => removeListItem(setCamperVehicles, camperVehicles, i)} className="absolute top-2 right-2 text-red-500 hover:text-red-700"><Trash2 className="w-5 h-5"/></button>
                      <input placeholder="VIN" className="border p-2 rounded w-full mb-3 uppercase font-mono mt-4 focus:ring-2 ring-[#D4AF37] outline-none" value={v.vin} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'vin', e.target.value)} />
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                        <input placeholder="Year" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.year} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'year', e.target.value)} />
                        <input placeholder="Make" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.make} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'make', e.target.value)} />
                        <input placeholder="Model" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.model} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'model', e.target.value)} />
                        <select className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none bg-white" value={v.style} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'style', e.target.value)}>
                          <option value="" disabled>Select Style...</option><option>Bumper Pull</option><option>Fifth Wheel</option><option>Goose Neck</option><option>Motorhome</option><option>Other</option>
                        </select>
                        <input placeholder="Length (ft)" inputMode="numeric" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.length} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'length', e.target.value)} />
                        <input placeholder="# of Slides" inputMode="numeric" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.slides} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'slides', e.target.value)} />
                        <input placeholder="Value ($)" type="number" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.value} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'value', e.target.value)} />
                        <select className="border p-2 rounded font-bold focus:ring-2 ring-[#D4AF37] outline-none bg-white" value={v.coverage} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'coverage', e.target.value)}>
                          <option>Liability Only</option><option>Full Coverage</option>
                        </select>
                      </div>
                      {v.coverage === 'Full Coverage' && (
                        <div className="mb-3 bg-yellow-50 p-2 rounded border border-[#D4AF37]/50">
                          <label className="text-xs font-bold text-black block mb-1">Comp/Coll Deductible:</label>
                          <select className="border p-2 rounded w-full bg-white font-semibold focus:ring-2 ring-[#D4AF37] outline-none" value={v.deductible} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'deductible', e.target.value)}>
                            <option value="" disabled>Select Deductible...</option>
                            {DEDUCTIBLES.map(d => <option key={d} value={d}>{d}</option>)}
                          </select>
                        </div>
                      )}
                      <div className="grid grid-cols-2 gap-3 pt-3 border-t">
                        <input placeholder="Current Carrier" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.carrier} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'carrier', e.target.value)} />
                        <input placeholder="Premium ($)" type="number" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.premium} onChange={e => updateListItem(setCamperVehicles, camperVehicles, i, 'premium', e.target.value)} />
                      </div>
                    </div>
                  ))}
                </section>
              )}

              {/* CYCLE SECTION */}
              {selectedCats.includes('cycle') && (
                <section className="bg-white p-4 rounded-lg border-l-4 border-black shadow-sm border border-gray-100">
                  <h2 className="text-xl font-bold mb-4 flex items-center justify-between text-black">
                    <span className="flex items-center gap-2"><Bike className="w-6 h-6 text-[#D4AF37]" /> Motorcycle / ATV</span>
                    <button onClick={() => addListItem(setCycleVehicles, cycleVehicles, {vin: '', year: '', make: '', model: '', cc: '', coverage: 'Liability Only', deductible: ''})} className="text-xs bg-gray-100 border border-gray-300 px-3 py-2 rounded-full font-bold hover:bg-[#D4AF37] hover:border-[#D4AF37] transition-all">+ Add Unit</button>
                  </h2>
                  {cycleVehicles.map((v, i) => (
                    <div key={i} className="bg-gray-50 p-4 rounded-lg mb-4 relative border border-gray-200">
                      <button onClick={() => removeListItem(setCycleVehicles, cycleVehicles, i)} className="absolute top-2 right-2 text-red-500 hover:text-red-700"><Trash2 className="w-5 h-5"/></button>
                      <input placeholder="VIN" className="border p-2 rounded w-full mb-3 uppercase font-mono mt-4 focus:ring-2 ring-[#D4AF37] outline-none" value={v.vin} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'vin', e.target.value)} />
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                        <input placeholder="Year" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.year} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'year', e.target.value)} />
                        <input placeholder="Make" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.make} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'make', e.target.value)} />
                        <input placeholder="Model" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.model} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'model', e.target.value)} />
                        <input placeholder="Engine (CC)" inputMode="numeric" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.cc} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'cc', e.target.value)} />
                        <select className="border p-2 rounded font-bold col-span-2 focus:ring-2 ring-[#D4AF37] outline-none bg-white" value={v.coverage} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'coverage', e.target.value)}>
                          <option>Liability Only</option><option>Full Coverage</option>
                        </select>
                        {v.coverage === 'Full Coverage' && (
                          <div className="col-span-2 bg-yellow-50 p-2 rounded border border-[#D4AF37]/50">
                            <label className="text-xs font-bold text-black block mb-1">Deductible:</label>
                            <select className="border p-2 rounded w-full bg-white font-semibold focus:ring-2 ring-[#D4AF37] outline-none" value={v.deductible} onChange={e => updateListItem(setCycleVehicles, cycleVehicles, i, 'deductible', e.target.value)}>
                              <option value="" disabled>Select Deductible...</option>
                              {DEDUCTIBLES.map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </section>
              )}

              {/* WATERCRAFT SECTION */}
              {selectedCats.includes('watercraft') && (
                <section className="bg-white p-4 rounded-lg border-l-4 border-black shadow-sm border border-gray-100">
                  <h2 className="text-xl font-bold mb-4 flex items-center justify-between text-black">
                    <span className="flex items-center gap-2"><Anchor className="w-6 h-6 text-[#D4AF37]" /> Watercraft</span>
                    <button onClick={() => addListItem(setWatercraft, watercraft, { year: '', make: '', model: '', hullId: '', material: '', materialOther: '', motorMake: '', hp: '', value: '', coverage: 'Liability Only', deductible: '' })} className="text-xs bg-gray-100 border border-gray-300 px-3 py-2 rounded-full font-bold hover:bg-[#D4AF37] hover:border-[#D4AF37] transition-all">+ Add Boat</button>
                  </h2>
                  {watercraft.map((v, i) => (
                    <div key={i} className="bg-gray-50 p-4 rounded-lg mb-4 relative border border-gray-200">
                      <button onClick={() => removeListItem(setWatercraft, watercraft, i)} className="absolute top-2 right-2 text-red-500 hover:text-red-700"><Trash2 className="w-5 h-5"/></button>
                      <input placeholder="Hull ID" className="border p-2 rounded w-full mb-3 uppercase font-mono mt-4 focus:ring-2 ring-[#D4AF37] outline-none" value={v.hullId} onChange={e => updateListItem(setWatercraft, watercraft, i, 'hullId', e.target.value)} />
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                        <input placeholder="Year" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.year} onChange={e => updateListItem(setWatercraft, watercraft, i, 'year', e.target.value)} />
                        <input placeholder="Make" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.make} onChange={e => updateListItem(setWatercraft, watercraft, i, 'make', e.target.value)} />
                        <input placeholder="Model" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.model} onChange={e => updateListItem(setWatercraft, watercraft, i, 'model', e.target.value)} />
                        
                        <div className="flex flex-col gap-1">
                          <select className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none bg-white" value={v.material} onChange={e => updateListItem(setWatercraft, watercraft, i, 'material', e.target.value)}>
                            <option value="" disabled>Hull Material...</option><option>Aluminum</option><option>Fiberglass</option><option>Wood</option><option>Other</option>
                          </select>
                          {v.material === 'Other' && <input placeholder="Describe Material..." className="border p-2 rounded text-sm focus:ring-2 ring-[#D4AF37] outline-none" value={v.materialOther} onChange={e => updateListItem(setWatercraft, watercraft, i, 'materialOther', e.target.value)} />}
                        </div>

                        <input placeholder="Motor Make" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.motorMake} onChange={e => updateListItem(setWatercraft, watercraft, i, 'motorMake', e.target.value)} />
                        <input placeholder="Horse Power" inputMode="numeric" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.hp} onChange={e => updateListItem(setWatercraft, watercraft, i, 'hp', e.target.value)} />
                        <input placeholder="Value ($)" type="number" className="border p-2 rounded focus:ring-2 ring-[#D4AF37] outline-none" value={v.value} onChange={e => updateListItem(setWatercraft, watercraft, i, 'value', e.target.value)} />
                        <select className="border p-2 rounded font-bold focus:ring-2 ring-[#D4AF37] outline-none bg-white" value={v.coverage} onChange={e => updateListItem(setWatercraft, watercraft, i, 'coverage', e.target.value)}>
                          <option>Liability Only</option><option>Full Coverage</option>
                        </select>
                      </div>
                      {v.coverage === 'Full Coverage' && (
                        <div className="mb-3 bg-yellow-50 p-2 rounded border border-[#D4AF37]/50">
                          <label className="text-xs font-bold text-black block mb-1">Comp/Coll Deductible:</label>
                          <select className="border p-2 rounded w-full bg-white font-semibold focus:ring-2 ring-[#D4AF37] outline-none" value={v.deductible} onChange={e => updateListItem(setWatercraft, watercraft, i, 'deductible', e.target.value)}>
                            <option value="" disabled>Select Deductible...</option>
                            {DEDUCTIBLES.map(d => <option key={d} value={d}>{d}</option>)}
                          </select>
                        </div>
                      )}
                    </div>
                  ))}
                </section>
              )}

              {/* LIFE INSURANCE */}
              {selectedCats.includes('life') && (
                <section className="bg-white p-4 rounded-lg border-l-4 border-[#D4AF37] shadow-sm border border-gray-100">
                  <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-black"><LifeBuoy className="w-6 h-6 text-[#D4AF37]" /> Life Insurance Interest</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input placeholder="Target Coverage Amount" className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none" value={life.amount} onChange={e => setLife({...life, amount: e.target.value})} />
                    <select className="border p-3 rounded bg-gray-50 focus:ring-2 ring-[#D4AF37] outline-none" value={life.term} onChange={e => setLife({...life, term: e.target.value})}>
                      <option value="">Desired Product...</option>
                      <option>10-Year Term</option><option>20-Year Term</option><option>30-Year Term</option><option>Whole Life</option><option>Final Expense</option>
                    </select>
                    <textarea placeholder="General health history or tobacco use notes..." className="border p-3 rounded bg-gray-50 md:col-span-2 h-20 focus:ring-2 ring-[#D4AF37] outline-none" value={life.healthNotes} onChange={e => setLife({...life, healthNotes: e.target.value})} />
                  </div>
                </section>
              )}

              {/* NOTES & BOTTOM ADDITIONS */}
              <section className="bg-gray-100 p-6 rounded-xl border border-gray-300">
                <h2 className="text-lg font-bold mb-4 text-black uppercase tracking-tight">Overall Notes & Additional Lines</h2>
                <textarea 
                  placeholder="Enter any additional context, account concerns, or specific carrier requests here..." 
                  className="w-full border p-3 rounded h-24 mb-6 focus:ring-2 ring-[#D4AF37] outline-none bg-white" 
                  value={overallNotes} 
                  onChange={e => setOverallNotes(e.target.value)} 
                />
                
                {!isClientMode && (
                  <>
                    <p className="text-sm font-bold text-gray-500 mb-3 uppercase">Add another Line of Business to this quote:</p>
                    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-2">
                      {CATEGORIES.filter(c => !selectedCats.includes(c.id)).map(cat => (
                        <button 
                          key={cat.id} 
                          onClick={() => toggleCategory(cat.id)}
                          className="flex flex-col items-center gap-1 p-3 bg-white border border-gray-200 rounded-lg hover:border-[#D4AF37] hover:shadow-md transition-all text-[10px] font-bold text-gray-700 uppercase"
                        >
                          <cat.icon className="w-5 h-5 text-gray-400" />
                          {cat.label}
                        </button>
                      ))}
                    </div>
                  </>
                )}
              </section>

              {/* === BOTTOM ACTION BUTTONS === */}
              <div className="flex flex-col md:flex-row items-center justify-between gap-4 border-t border-gray-200 pt-8 mt-8">
                <button 
                  onClick={() => setShowClearConfirm(true)} 
                  className="text-red-500 font-bold hover:text-red-700 transition-colors order-2 md:order-1 py-2"
                >
                  Clear All Fields
                </button>
                <button 
                  onClick={() => setShowSummary(true)} 
                  className="bg-[#D4AF37] hover:bg-[#b5952f] w-full md:w-auto text-black px-8 py-4 rounded-xl font-extrabold flex items-center justify-center gap-2 shadow-lg transition-all text-lg order-1 md:order-2"
                >
                  <CheckCircle className="w-6 h-6" /> Review & Submit
                </button>
              </div>

            </div>
          </div>

          {/* SUMMARY MODAL */}
          {showSummary && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] flex flex-col">
                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                  <h3 className="text-xl font-bold text-black">Review Quote Details</h3>
                  <button onClick={() => setShowSummary(false)} className="text-slate-500 hover:text-black text-2xl leading-none transition-colors">&times;</button>
                </div>
                <div className="p-4 flex-grow overflow-y-auto">
                  <pre className="bg-slate-100 p-4 rounded text-sm text-slate-800 whitespace-pre-wrap font-mono border border-slate-300">
                    {generateSummaryText()}
                  </pre>
                </div>
                <div className="p-4 border-t bg-gray-50 rounded-b-xl flex flex-col md:flex-row justify-end gap-3">
                  {!isClientMode && (
                    <button onClick={() => { copyToClipboard(); setAlertMsg('Summary copied to clipboard!'); }} className="px-4 py-2 text-black bg-white font-bold hover:bg-yellow-50 rounded border border-gray-300 md:mr-auto transition-colors">Copy to Clipboard</button>
                  )}
                  <button onClick={() => setShowSummary(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded transition-colors">Edit Data</button>
                  <button onClick={submitToDatabase} disabled={isSubmitting} className="bg-[#D4AF37] hover:bg-[#C5A017] text-black px-6 py-2 rounded font-extrabold flex items-center justify-center gap-2 shadow-md transition-colors disabled:opacity-50">
                    {isSubmitting ? 'Saving Securely...' : 'Submit Securely'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
